site_name: Versus — Documentation
site_description: Application de catalogage et d'édition de scènes de combat cinématographiques
site_author: Samir Keriou
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  palette:
    scheme: slate
    primary: deep-orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
    - content.code.annotate
  icon:
    admonition:
      note: octicons/tag-16
      tip: octicons/squirrel-16
      warning: octicons/alert-16

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Accueil: index.md
  - Guide utilisateur:
    - Connexion: guide/connexion.md
    - Administration: guide/admin.md
    - Éditeur de scènes: guide/editeur.md
  - Technique:
    - Architecture: technique/architecture.md
    - Installation: technique/installation.md
